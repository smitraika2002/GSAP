<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GSAP Landing Page</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h2 class="logo">SmitDev</h2>
    <ul class="nav-links">
      <li>Home</li>
      <li>About</li>
      <li>Projects</li>
      <li>Contact</li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    
    <div class="hero-content">
      <h1 class="hero-title">Build. Animate. Impress.</h1>
      <p class="hero-text">Clean landing page with smooth GSAP animations</p>
      <button class="cta">Get Started</button>
    </div>

    <div class="hero-image">
      <img src="https://picsum.photos/400" alt="Hero Image">
    </div>

  </section>

  <!-- FEATURES -->
  <section class="features">
    <div class="card">⚡ Fast</div>
    <div class="card">🎨 Modern</div>
    <div class="card">🚀 Animated</div>
  </section>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
